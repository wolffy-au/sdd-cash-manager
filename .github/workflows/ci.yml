name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "bugfix/**"
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Poetry
        run: pip install --upgrade poetry

      - name: Sync dependencies
        run: poetry install --all-groups

      - name: Markdown lint
        if: matrix.python-version == '3.12'
        run: poetry run pymarkdownlnt fix ./*.md specs/*.md

      - name: Ruff lint
        if: matrix.python-version == '3.12'
        run: poetry run ruff check . --fix

      - name: Pyright type check
        if: matrix.python-version == '3.12'
        run: poetry run pyright

      - name: Mypy type check
        if: matrix.python-version == '3.12'
        run: poetry run mypy src/

      # - name: Check layer boundaries
      #   run: python scripts/check_layer_boundaries.py

      - name: Behave BDD tests
        run: poetry run behave tests/features/ || true

      - name: Run pytest
        run: poetry run pytest --cov --cov-branch --cov-report=xml --cov-fail-under=80

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results-py${{ matrix.python-version }}
          path: build/
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: build/coverage.xml
          fail_ci_if_error: false

  quality:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        run: pip install --upgrade poetry

      - name: Sync dependencies
        run: poetry install --all-groups

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: test-results-py3.12
          path: build/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@8e9b0ca0a7273d6f16986388d98393efdfcf56fd
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk dependency scan
        run: snyk test --package-manager=poetry --severity-threshold=high --org=wolffy-au

      - name: Snyk code scan
        run: snyk code test --package-manager=poetry --severity-threshold=high --org=wolffy-au --include-ignores

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          category: "/language:python"
