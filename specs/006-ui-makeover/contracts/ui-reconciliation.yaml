openapi: 3.1.0
info:
  title: UI Makeover - Reconciliation Contracts
  version: 1.0.0
paths:
  /accounts:
    get:
      summary: Fetch hierarchical account tree for ledger sidebar
      responses:
        '200':
          description: Returns accounts with balances, children, and visibility metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountNode'
  /reconciliation/sessions:
    get:
      summary: Start or retrieve the latest reconciliation session
      responses:
        '200':
          description: Session with IDs and metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationSession'
  /reconciliation/sessions/unreconciled:
    get:
      summary: List unreconciled transactions for a session
      parameters:
        - name: session_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of unreconciled ledger rows plus difference payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReconciliationTransaction'
                  difference:
                    $ref: '#/components/schemas/DifferencePayload'
  /reconciliation/sessions/{session_id}/transactions:
    post:
      summary: Apply a selection of transactions and update difference
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                selected_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated difference summary and row statuses
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DifferencePayload'
                  - type: object
                    properties:
                      message:
                        type: string
components:
  schemas:
    AccountNode:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        balance:
          type: number
        visible:
          type: boolean
        children:
          type: array
          items:
            $ref: '#/components/schemas/AccountNode'
    ReconciliationSession:
      type: object
      properties:
        session_id:
          type: string
        start_date:
          type: string
          format: date
        status:
          type: string
          enum: [OPEN, CLOSED]
    ReconciliationTransaction:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        description:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [UNCLEARED, CLEARED, RECONCILED]
        processing_status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
    DifferencePayload:
      type: object
      properties:
        amount:
          type: number
        difference_status:
          type: string
          enum: [balanced, under, over]
        remaining_uncleared:
          type: number
        guidance_text:
          type: string
